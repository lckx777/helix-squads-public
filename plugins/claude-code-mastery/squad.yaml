name: "claude-code-mastery"
version: "1.0.0"
description: "Claude Code Full Spectrum Expertise — hooks, skills, subagents, MCP, plugins, agent teams, customização e integração"
author: "lucac"
license: MIT
slashPrefix: "ccm"

aios:
  minVersion: "2.1.0"
  type: squad

tags:
  - claude-code
  - hooks
  - skills
  - subagents
  - mcp
  - plugins
  - agent-teams

config:
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  source-tree: config/source-tree.md

governance:
  constitution: config/CONSTITUTION.md
  epistemic_protocol: config/EPISTEMIC-PROTOCOL.md
  circuit_breaker: config/CIRCUIT-BREAKER.md

components:
  agents:
    - claude-mastery-chief.md
    - config-engineer.md
    - hooks-architect.md
    - mcp-integrator.md
    - project-integrator.md
    - roadmap-sentinel.md
    - skill-craftsman.md
    - swarm-orchestrator.md
  tasks:
    - audit-integration.md
    - audit-settings.md
    - audit-setup.md
    - brownfield-setup.md
    - ci-cd-setup.md
    - claude-md-engineer.md
    - configure-claude-code.md
    - context-rot-audit.md
    - create-agent-definition.md
    - create-rules.md
    - create-team-topology.md
    - diagnose.md
    - enterprise-config.md
    - hook-designer.md
    - integrate-project.md
    - mcp-integration-plan.md
    - mcp-workflow.md
    - multi-project-setup.md
    - optimize-context.md
    - optimize-workflow.md
    - parallel-decomposition.md
    - permission-strategy.md
    - sandbox-setup.md
    - setup-repository.md
    - setup-wizard.md
    - worktree-strategy.md
  workflows:
    - wf-audit-complete.yaml
    - wf-knowledge-update.yaml
    - wf-project-setup.yaml

# v3 state — checkpoint dir per-project
state:
  enabled: true
  storage: file
  checkpoint_dir: "${PROJECT_CWD:-$PWD}/.squad-state/claude-code-mastery"
  resume: true
  retention: 10

# v3 model_strategy — prevent silent downgrade
model_strategy:
  orchestrator: "claude-opus-4-7"
  workers: "claude-sonnet-4-6"
  reviewers: "claude-opus-4-7"
  override: true

# v3 harness — deterministic enforcement layer (was prompt-level)
harness:
  doom_loop:
    enabled: true
    max_identical_outputs: 3
    similarity_threshold: 0.95
    max_step_retries: 5
    on_detect: abort
    cooldown_seconds: 0
  ralph_loop:
    enabled: true
    max_iterations: 5
    persist_state: true
  context_compaction:
    enabled: true
    strategy: key-fields
    max_handoff_tokens: 4000
    preserve_schema_fields: true
  filesystem_collaboration:
    enabled: true
    artifact_dir: "${PROJECT_CWD:-$PWD}/.squad-state/artifacts"
    cleanup: manual
  traces:
    enabled: true
    level: standard
    include_outputs: false
  self_verify:
    default_enabled: true
  quality_framework:
    enabled: true
    threshold: 7.0
    dimensions:
      accuracy:  { weight: 1.0, threshold: 7.0, veto: true }
      coherence: { weight: 0.9, threshold: 7.0, veto: false }

# Portability — distinguishes global vs per-project assets
portability:
  global_home: "${SQUAD_HOME:-$HOME/.claude/skills/squads/squads/claude-code-mastery}"
  project_data_path: "${PROJECT_CWD:-$PWD}"
  resolved_by: "scripts/install-squads-to-global.sh"
