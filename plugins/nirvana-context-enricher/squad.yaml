# --- Identity ---
name: nirvana-context-enricher
version: 1.0.0
description: "Parallel multi-agent context enrichment — deep research, skills ecosystem, and academic literature synthesized into 16-section architectural briefings"

author: "Generated by Nirvana Squad Creator (gutomec/nirvana-context-enricher lineage)"
license: MIT
slashPrefix: nce

# --- AIOS Compatibility ---
aios:
  minVersion: "2.1.0"
  type: squad

# --- Components ---
components:
  agents:
    - nirva.md
    - sage.md
    - scout.md
    - scholar.md
    - lotus.md
  tasks:
    - parse-enrichment-request.md
    - dispatch-research-team.md
    - execute-deep-research.md
    - explore-skills-ecosystem.md
    - collect-academic-sources.md
    - validate-coverage-quorum.md
    - synthesize-context-report.md
    - deliver-enrichment-report.md
    - cleanup-research-team.md
  workflows:
    - context-enrichment-pipeline.yaml
  chains:
    - context-enrichment.yaml
  checklists:
    - pre-dispatch-readiness.md
    - synthesis-quality-gate.md
  templates:
    - research-findings.template.md
    - context-report-16section.template.md
  tools: []
  scripts:
    - scripts/coverage-validator.cjs

# --- Config Inheritance ---
config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  source-tree: config/source-tree.md

# --- Dependencies ---
dependencies:
  node: []
  python: []
  squads: []

# --- Discovery ---
tags:
  - context-enrichment
  - parallel-research
  - knowledge-synthesis
  - agent-teams
  - deep-research
  - academic-research
  - ecosystem-mapping

# v3 state — checkpoint dir per-project
state:
  enabled: true
  storage: file
  checkpoint_dir: "${PROJECT_CWD:-$PWD}/.squad-state/nirvana-context-enricher"
  resume: true
  retention: 10

# v3 model_strategy — prevent silent downgrade
model_strategy:
  orchestrator: "claude-opus-4-7"
  workers: "claude-sonnet-4-6"
  reviewers: "claude-opus-4-7"
  override: true

# v3 harness — deterministic enforcement layer (was prompt-level)
harness:
  doom_loop:
    enabled: true
    max_identical_outputs: 3
    similarity_threshold: 0.95
    max_step_retries: 5
    on_detect: abort
    cooldown_seconds: 0
  ralph_loop:
    enabled: true
    max_iterations: 5
    persist_state: true
  context_compaction:
    enabled: true
    strategy: key-fields
    max_handoff_tokens: 4000
    preserve_schema_fields: true
  filesystem_collaboration:
    enabled: true
    artifact_dir: "${PROJECT_CWD:-$PWD}/.squad-state/artifacts"
    cleanup: manual
  traces:
    enabled: true
    level: standard
    include_outputs: false
  self_verify:
    default_enabled: true
  quality_framework:
    enabled: true
    threshold: 7.0
    dimensions:
      accuracy:  { weight: 1.0, threshold: 7.0, veto: true }
      coherence: { weight: 0.9, threshold: 7.0, veto: false }

# Portability — distinguishes global vs per-project assets
portability:
  global_home: "${SQUAD_HOME:-$HOME/.claude/skills/squads/squads/nirvana-context-enricher}"
  project_data_path: "${PROJECT_CWD:-$PWD}"
  resolved_by: "scripts/install-squads-to-global.sh"
